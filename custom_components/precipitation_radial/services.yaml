update_location:
  name: Update location
  description: Update the latitude and longitude for precipitation data.
  target:
  fields:
    latitude:
      name: Latitude
      description: The latitude coordinate.
      required: true
      selector:
        number:
          min: -90
          max: 90
          mode: box
    longitude:
      name: Longitude
      description: The longitude coordinate.
      required: true
      selector:
        number:
          min: -180
          max: 180
          mode: box
